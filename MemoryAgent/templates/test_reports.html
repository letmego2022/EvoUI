<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试报告列表</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f4f7f6; }

        .report-card {
            transition: all .3s ease;
        }

        .report-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15);
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        #successToast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1055;
            display: none;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="bi bi-journal-check text-success"></i>
            测试报告列表
            <span class="badge bg-secondary" id="reportCount">
                {{ reports|length }}
            </span>
        </h2>

        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> 返回治理平台
        </a>
    </div>

    {% if reports %}
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="reportContainer">
        {% for report in reports %}
        <div class="col report-item" id="card-{{ report.dirname }}">
            <div class="card h-100 report-card">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-file-earmark-text text-primary me-2"></i>
                        {{ report.name }}
                    </h5>
                    <p class="card-text text-muted">
                        <i class="bi bi-clock"></i> 生成时间: {{ report.created }}
                    </p>
                </div>

                <div class="card-footer bg-transparent">
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('serve_report', filename=report.path) }}"
                           target="_blank"
                           class="btn btn-primary flex-fill">
                            <i class="bi bi-eye"></i> 查看
                        </a>

                        <button class="btn btn-outline-danger flex-fill"
                                onclick="confirmDelete('{{ report.dirname }}')">
                            <i class="bi bi-trash"></i> 删除
                        </button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="alert alert-info text-center py-5">
        <i class="bi bi-inbox fs-1 d-block mb-3"></i>
        <h4>暂无测试报告</h4>
        <p class="mb-0">还没有生成任何测试报告，请先运行测试。</p>
    </div>
    {% endif %}
</div>

<!-- 删除确认 Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">
            <i class="bi bi-exclamation-triangle"></i> 确认删除
        </h5>
      </div>
      <div class="modal-body text-center">
        该报告将被永久删除，是否继续？
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">确认删除</button>
      </div>
    </div>
  </div>
</div>

<!-- 成功提示 -->
<div class="toast align-items-center text-bg-success border-0" id="successToast">
  <div class="d-flex">
    <div class="toast-body">
        删除成功
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let currentDeleteDir = null;

function confirmDelete(dirname) {
    currentDeleteDir = dirname;
    const modal = new bootstrap.Modal(document.getElementById('deleteModal'));
    modal.show();
}

document.getElementById("deleteConfirmBtn").addEventListener("click", function () {

    fetch(`/test_reports/delete/${currentDeleteDir}`, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {

            const card = document.getElementById("card-" + currentDeleteDir);

            card.classList.add("fade-out");

            setTimeout(() => {
                card.remove();
                updateCount();
            }, 300);

            showSuccessToast();
        }

        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
    });
});

function updateCount() {
    const count = document.querySelectorAll(".report-item").length;
    document.getElementById("reportCount").innerText = count;
}

function showSuccessToast() {
    const toastEl = document.getElementById("successToast");
    const toast = new bootstrap.Toast(toastEl, { delay: 1000 });
    toastEl.style.display = "block";
    toast.show();
}
</script>

</body>
</html>
